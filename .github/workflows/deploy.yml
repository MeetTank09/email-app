name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

 
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin


    - name: Build Docker Image
      run: docker build -t 7tmak/my-email-app:latest .


    - name: Push Docker Image
      run: docker push 7tmak/my-email-app:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
       host: ${{ secrets.EC2_HOST }}
       username: ubuntu  
       key: ${{ secrets.EC2_SSH_KEY }}
       script: |
        docker pull 7tmak/my-email-app:latest
        docker ps -q --filter "publish=5050" | xargs -r docker stop
        docker ps -aq --filter "publish=5050" | xargs -r docker rm
        docker stop app || true
        docker rm app || true  
        docker run -d --name app -p 5050:5050 7tmak/my-email-app:latest