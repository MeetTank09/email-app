name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

 
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin


    - name: Build Image
      run: docker build -t 7tmak/my-email-app:${{ github.sha }} .

    - name: Push Image
      run: docker push 7tmak/my-email-app:${{ github.sha }}

   
    - name: SSH to EC2 and deploy
      uses: appleboy/ssh-action@v0.1.6
      with:
       host: ${{ secrets.EC2_HOST }}
       username: ec2-user
       key: ${{ secrets.EC2_SSH_KEY }}
       port: 22
       script: |
         docker pull 7tmak/my-email-app:latest
         docker stop app || true
         docker rm app || true
         docker run -d --name app -p 5050:5050 7tmak/my-email-app:latest