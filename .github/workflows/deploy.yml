name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker push 7tmak/my-email-app:latest

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Docker Image
      run: docker push docker pull 7tmak/my-email-app 

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user  
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull 7tmak/my-email-app
          docker stop app || true
          docker rm app || true
          docker run -d --rm --name app -p 5050:5050 7tmak/my-email-app