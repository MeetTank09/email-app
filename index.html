<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Store App v1 hii guys</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Email Store App</h2>
    <input type="email" id="emailInput" placeholder="Enter your email" />

    <div class="buttons">
      <button class="save" onclick="saveEmail()">Save Email</button>
      <button class="show" onclick="showEmails()">Show Emails</button>
    </div>

    <h3>Saved Emails</h3>
    <ul id="emailList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
